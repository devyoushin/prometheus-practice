# PodMonitor 예제: Service 없이 파드에서 직접 메트릭 수집
# 활용 예: DaemonSet, Job, Service 없는 파드
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: example-app-pods
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: example-app         # 대상 파드의 레이블
  namespaceSelector:
    matchNames:
      - default
  podMetricsEndpoints:
    - port: http               # 파드의 containerPort 이름
      interval: 15s
      path: /metrics
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
