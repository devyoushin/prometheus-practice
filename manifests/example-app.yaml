# 예제 애플리케이션 (Prometheus 메트릭 노출)
# Prometheus 공식 예제 앱 사용 (metrics 경로: /metrics, 포트: 8080)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-app
  namespace: default
  labels:
    app: example-app
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: example-app
  template:
    metadata:
      labels:
        app: example-app
        version: v1
    spec:
      containers:
        - name: example-app
          image: quay.io/prometheus/prometheus-example-app:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: example-app
  namespace: default
  labels:
    app: example-app           # ServiceMonitor selector와 일치
spec:
  selector:
    app: example-app
  ports:
    - name: http               # ServiceMonitor endpoints.port와 일치
      port: 8080
      targetPort: http
      protocol: TCP
  type: ClusterIP
